<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Proxy Oman • Premium Proxy Manager</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1829 0%, #142e44 100%);
            min-height: 100vh;
            padding: clamp(0.75rem, 3vw, 2rem);
        }

        /* Layout principal */
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
            gap: clamp(1rem, 2vw, 2rem);
        }

        /* Cartes communes */
        .glass-card {
            background: rgba(15, 35, 55, 0.75);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(0, 180, 255, 0.15);
            border-radius: 2rem;
            padding: clamp(1.2rem, 3vw, 2rem);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(64, 224, 208, 0.1) inset;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            box-shadow: 0 25px 50px -12px rgba(0, 200, 200, 0.3);
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem 1.5rem;
            margin-bottom: 1rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .flag-om {
            width: 50px;
            height: 34px;
            background: linear-gradient(135deg, #ce1126 0%, #ce1126 40%, #fff 40%, #fff 60%, #006647 60%, #006647 100%);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            position: relative;
        }

        .flag-om::after {
            content: "⚔️";
            position: absolute;
            left: 4px;
            top: 2px;
            font-size: 16px;
            filter: drop-shadow(0 2px 2px black);
        }

        h1 {
            color: white;
            font-weight: 700;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .badge-pro {
            background: linear-gradient(145deg, #00d4b0, #0096c0);
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: clamp(0.75rem, 2vw, 1rem);
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 2px 8px rgba(0,255,200,0.3);
        }

        .api-counter {
            background: #0a2538;
            color: #a0d4ff;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid #2d7fb9;
            font-weight: 500;
            flex-wrap: wrap;
            box-shadow: 0 4px 12px rgba(0, 30, 50, 0.6);
        }

        .api-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #3effe0;
            text-shadow: 0 0 10px #00c8b0;
        }

        /* Grille proxy */
        .proxy-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin: 1.5rem 0 2rem;
        }

        .proxy-field {
            background: #0f1e2e;
            border-radius: 1.5rem;
            padding: 1rem 0.8rem;
            border: 1px solid #2c577a;
            transition: all 0.2s;
        }

        .proxy-field:hover {
            border-color: #3ecfcf;
            background: #142b40;
        }

        .proxy-field .label {
            color: #90bde0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .proxy-field .value {
            color: white;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            word-break: break-word;
        }

        .copy-icon {
            color: #58b3e0;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 2rem;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .copy-icon:hover {
            background: #1f5070;
            color: white;
            transform: scale(1.1);
        }

        /* Bouton principal */
        .btn-primary {
            background: linear-gradient(145deg, #02c0a0, #0280b0);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: clamp(1rem, 3vw, 1.3rem);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px -8px #00bba0;
            width: fit-content;
        }

        .btn-primary:not(:disabled):hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px -8px #00ffc3;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.4);
        }

        /* IP Checker */
        .ip-checker {
            background: #0a2538;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1.8rem;
            border: 1px solid #2d7fb9;
        }

        .ip-main {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem 2rem;
        }

        .ip-address {
            font-size: clamp(1.3rem, 4vw, 2rem);
            font-family: 'Fira Code', monospace;
            color: white;
            background: #051a28;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #3699d9;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 0 15px rgba(0,160,255,0.3);
            word-break: break-all;
        }

        .isp-info {
            color: #b3dcff;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            background: #1a3a50;
            border: 1px solid #3f7fa0;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .dot.fresh { background: #26e6a4; box-shadow: 0 0 12px #26e6a4; }
        .dot.medium { background: #f5b342; box-shadow: 0 0 10px #f5b342; }
        .dot.slow { background: #ff7b7b; box-shadow: 0 0 10px #ff7b7b; }

        .stats-row {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
            color: white;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #0a1c30;
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00e5b0;
        }

        /* Historique */
        .history-section {
            background: rgba(8, 28, 45, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #2d5f80;
            height: fit-content;
        }

        .history-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-bottom: 1.2rem;
        }

        .history-header h3 {
            color: white;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-stats {
            display: flex;
            gap: 1rem;
            color: #b0d0f0;
            flex-wrap: wrap;
            margin: 0.5rem 0 1rem;
        }

        .history-list {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 0.3rem;
            scrollbar-width: thin;
            scrollbar-color: #2d7fb9 #0a2538;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #0a2538;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #2d7fb9;
            border-radius: 10px;
        }

        .history-item {
            background: #0a2338;
            border-radius: 1.2rem;
            padding: 0.9rem 1rem;
            margin-bottom: 0.6rem;
            border-left: 5px solid #00c9a7;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover {
            background: #144a6b;
            border-left-color: #3effe0;
            transform: translateX(4px);
        }

        .history-host {
            font-family: monospace;
            font-weight: 600;
            color: white;
            font-size: 0.95rem;
        }

        .history-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .history-time {
            color: #9bc6ed;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-icon {
            background: #1e4b6e;
            border: none;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: 0.15s;
        }

        .btn-icon:hover {
            background: #2d6b96;
        }

        /* Responsive breakpoints */
        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .proxy-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .proxy-grid {
                grid-template-columns: 1fr;
            }
            
            .ip-main {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .api-counter {
                width: 100%;
                justify-content: center;
            }
            
            .btn-primary {
                width: 100%;
            }
        }

        /* Loading animation */
        .loading-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Utilitaires */
        .text-small { font-size: 0.8rem; }
        .mt-2 { margin-top: 0.8rem; }
        .gap-2 { gap: 1rem; }
        .flex-wrap { flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header avec compteur -->
        <div class="header">
            <div class="brand">
                <div class="flag-om"></div>
                <h1>Proxy Oman <span class="badge-pro">1 clic = 1 proxy</span></h1>
            </div>
            <div class="api-counter">
                <i class="fas fa-chart-simple"></i>
                <span>Appels API aujourd'hui :</span>
                <span class="api-number" id="apiCount">0</span>
            </div>
        </div>

        <!-- Colonne principale -->
        <div class="left-col">
            <div class="glass-card">
                <h2 style="color: white; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-shield-halved" style="color: #00e5b0;"></i> 
                    Proxy Actif
                </h2>
                
                <!-- Proxy details grid -->
                <div class="proxy-grid" id="proxyGrid"></div>

                <!-- Actions -->
                <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 1rem;">
                    <button class="btn-primary" id="changeProxyBtn">
                        <i class="fas fa-rotate"></i> Changer proxy (1 appel)
                    </button>
                    <span class="text-small" style="color: #7fc9ff;" id="changeStatus"></span>
                </div>

                <!-- IP Checker -->
                <div class="ip-checker">
                    <div class="ip-main">
                        <div class="ip-address">
                            <span id="ipText">--.--.--.--</span>
                            <i class="fa-regular fa-copy copy-icon" id="copyIpIcon"></i>
                        </div>
                        <div class="isp-info">
                            <i class="fas fa-building"></i>
                            <span id="ispText">Analyse...</span>
                        </div>
                        <div class="status-badge">
                            <span class="dot" id="statusDot"></span>
                            <span id="statusText">Attente</span>
                        </div>
                    </div>
                    
                    <div class="stats-row">
                        <div class="stat-item">
                            <i class="fas fa-bolt"></i>
                            <span>Latence: <span class="stat-value" id="latencyValue">---</span> ms</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-clock"></i>
                            <span>Dernier: <span id="lastCheckTime">---</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Colonne droite : Historique -->
        <div class="right-col">
            <div class="history-section">
                <div class="history-header">
                    <h3><i class="fas fa-clock-rotate-left" style="color: #00e5b0;"></i> Historique</h3>
                    <span class="badge-pro" style="background: #1d4560;" id="historyCount">0</span>
                </div>

                <div class="history-stats">
                    <span><i class="fas fa-chart-line"></i> Moyenne: <span id="avgLatency">0</span>ms</span>
                    <span><i class="fas fa-gauge-high"></i> Rapides: <span id="fastCount">0</span></span>
                </div>

                <div class="history-list" id="historyList">
                    <div style="color: #4f718b; text-align: center; padding: 2rem;">Aucun proxy pour l'instant</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Configuration - un seul proxy par appel
            const API_URL = 'https://ipapi.novproxy.com/novapi?user=nl8hehx38g8hbwdfdaz3&port=443&count=1&region=OM&st=&type=2';
            
            // État
            let currentProxy = null;
            let history = [];
            let apiCallCount = parseInt(localStorage.getItem('apiCount') || '0');
            let lastCallDate = localStorage.getItem('lastCallDate') || '';

            // Reset compteur si nouveau jour
            const today = new Date().toDateString();
            if (lastCallDate !== today) {
                apiCallCount = 0;
                localStorage.setItem('lastCallDate', today);
            }

            // Références DOM
            const elements = {
                proxyGrid: document.getElementById('proxyGrid'),
                changeBtn: document.getElementById('changeProxyBtn'),
                changeStatus: document.getElementById('changeStatus'),
                ipSpan: document.getElementById('ipText'),
                copyIpIcon: document.getElementById('copyIpIcon'),
                statusDot: document.getElementById('statusDot'),
                statusText: document.getElementById('statusText'),
                latencySpan: document.getElementById('latencyValue'),
                lastCheckSpan: document.getElementById('lastCheckTime'),
                ispSpan: document.getElementById('ispText'),
                apiCountSpan: document.getElementById('apiCount'),
                historyList: document.getElementById('historyList'),
                historyCountSpan: document.getElementById('historyCount'),
                avgLatencySpan: document.getElementById('avgLatency'),
                fastCountSpan: document.getElementById('fastCount')
            };

            // Mise à jour compteur API
            function updateApiCounter() {
                elements.apiCountSpan.innerText = apiCallCount;
                localStorage.setItem('apiCount', apiCallCount);
            }
            updateApiCounter();

            // Parse réponse proxy
            function parseProxyResponse(text) {
                const parts = text.trim().split(':');
                if (parts.length >= 4) {
                    return {
                        host: parts[0],
                        port: parts[1],
                        username: parts[2],
                        password: parts[3],
                        full: text.trim(),
                        timestamp: new Date().toLocaleTimeString('fr-FR'),
                        fullDate: new Date()
                    };
                }
                return null;
            }

            // Vérification IP + latence
            async function checkPublicIP() {
                const start = performance.now();
                try {
                    const response = await fetch('https://api.ipify.org?format=json', { 
                        cache: 'no-store',
                        mode: 'cors'
                    });
                    const data = await response.json();
                    const end = performance.now();
                    const latency = Math.round(end - start);
                    
                    elements.ipSpan.innerText = data.ip;
                    elements.latencySpan.innerText = latency;
                    elements.lastCheckSpan.innerText = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    
                    // Qualité connexion
                    if (latency < 400) {
                        elements.statusDot.className = 'dot fresh';
                        elements.statusText.innerText = 'FRAÎCHE';
                    } else if (latency < 800) {
                        elements.statusDot.className = 'dot medium';
                        elements.statusText.innerText = 'MOYENNE';
                    } else {
                        elements.statusDot.className = 'dot slow';
                        elements.statusText.innerText = 'LENTE';
                    }
                    
                    // ISP (non bloquant)
                    fetch('https://ipapi.co/json/')
                        .then(res => res.json())
                        .then(data => {
                            elements.ispSpan.innerText = data.org || data.isp || 'Inconnu';
                        })
                        .catch(() => elements.ispSpan.innerText = 'Non disponible');
                    
                    return latency;
                } catch (error) {
                    elements.ipSpan.innerText = '--.--.--.--';
                    elements.statusText.innerText = 'ÉCHEC';
                    elements.latencySpan.innerText = '---';
                    return null;
                }
            }

            // Ajout à l'historique
            function addToHistory(proxy, latency) {
                if (!proxy?.host) return;
                
                const entry = {
                    ...proxy,
                    latency: latency ?? 'N/A',
                    quality: latency && latency < 400 ? 'fast' : (latency && latency < 800 ? 'medium' : 'slow'),
                    time: new Date().toLocaleTimeString('fr-FR')
                };
                
                history.unshift(entry);
                if (history.length > 20) history.pop();
                
                updateHistoryDisplay();
            }

            // Mise à jour affichage historique
            function updateHistoryDisplay() {
                if (history.length === 0) {
                    elements.historyList.innerHTML = '<div style="color: #4f718b; text-align: center; padding: 2rem;">Aucun proxy pour l\'instant</div>';
                    elements.historyCountSpan.innerText = '0';
                    elements.avgLatencySpan.innerText = '0';
                    elements.fastCountSpan.innerText = '0';
                    return;
                }
                
                let html = '';
                let totalLatency = 0;
                let latencyCount = 0;
                let fastCount = 0;
                
                history.forEach((proxy, index) => {
                    if (proxy.latency !== 'N/A' && proxy.latency !== null) {
                        totalLatency += proxy.latency;
                        latencyCount++;
                        if (proxy.latency < 400) fastCount++;
                    }
                    
                    const latencyColor = proxy.latency < 400 ? '#26e6a4' : (proxy.latency < 800 ? '#f5b342' : '#ff7b7b');
                    
                    html += `
                        <div class="history-item" data-index="${index}">
                            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                                <span class="history-host">${proxy.host}:${proxy.port}</span>
                                <span style="color: ${latencyColor};">
                                    <i class="fas fa-bolt"></i> ${proxy.latency}ms
                                </span>
                            </div>
                            <div class="history-meta">
                                <span class="history-time">
                                    <i class="fa-regular fa-clock"></i> ${proxy.time}
                                </span>
                                <button class="btn-icon" onclick="event.stopPropagation(); copyProxy('${proxy.full}')">
                                    <i class="fa-regular fa-copy"></i> Copier
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                elements.historyList.innerHTML = html;
                
                // Ajouter écouteurs pour clic sur item
                document.querySelectorAll('.history-item').forEach(item => {
                    item.addEventListener('click', () => useOldProxy(parseInt(item.dataset.index)));
                });
                
                elements.historyCountSpan.innerText = history.length;
                const avgLatency = latencyCount > 0 ? Math.round(totalLatency / latencyCount) : 0;
                elements.avgLatencySpan.innerText = avgLatency;
                elements.fastCountSpan.innerText = fastCount;
            }

            // Copier proxy complet
            window.copyProxy = function(full) {
                navigator.clipboard.writeText(full);
                // feedback visuel optionnel
            };

            // Utiliser ancien proxy
            function useOldProxy(index) {
                if (history[index]) {
                    currentProxy = {...history[index]};
                    renderProxyData(currentProxy);
                    checkPublicIP().then(latency => {
                        history[index].latency = latency;
                        updateHistoryDisplay();
                    });
                }
            }

            // Rendu proxy dans la grille
            function renderProxyData(data) {
                const items = [
                    { label: 'HÔTE', value: data.host, icon: 'fa-server' },
                    { label: 'PORT', value: data.port, icon: 'fa-plug' },
                    { label: 'UTILISATEUR', value: data.username, icon: 'fa-user' },
                    { label: 'MOT DE PASSE', value: data.password, icon: 'fa-lock' }
                ];

                let html = '';
                items.forEach(item => {
                    html += `
                        <div class="proxy-field">
                            <div class="label"><i class="fas ${item.icon}"></i> ${item.label}</div>
                            <div class="value">
                                <span>${item.value || '---'}</span>
                                <i class="fa-regular fa-copy copy-icon" data-copy="${item.value || ''}"></i>
                            </div>
                        </div>
                    `;
                });
                elements.proxyGrid.innerHTML = html;

                // Gestionnaires copie
                document.querySelectorAll('.copy-icon[data-copy]').forEach(icon => {
                    icon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const text = icon.getAttribute('data-copy');
                        if (text && text !== '---') {
                            navigator.clipboard.writeText(text);
                        }
                    });
                });
            }

            // Charger nouveau proxy
            async function fetchNewProxy() {
                elements.changeBtn.disabled = true;
                elements.changeStatus.innerText = 'Chargement...';
                
                try {
                    const response = await fetch(API_URL);
                    const text = await response.text();
                    
                    apiCallCount++;
                    updateApiCounter();
                    
                    const parsed = parseProxyResponse(text);
                    if (parsed) {
                        if (currentProxy) {
                            const oldLatency = elements.latencySpan.innerText !== '---' ? 
                                parseInt(elements.latencySpan.innerText) : null;
                            addToHistory(currentProxy, oldLatency);
                        }
                        
                        currentProxy = parsed;
                        renderProxyData(parsed);
                        
                        const latency = await checkPublicIP();
                        addToHistory(parsed, latency);
                        
                        elements.changeStatus.innerText = '✓ Proxy chargé';
                    } else {
                        elements.changeStatus.innerText = '✗ Erreur format';
                    }
                } catch (err) {
                    elements.changeStatus.innerText = '✗ Échec appel API';
                } finally {
                    elements.changeBtn.disabled = false;
                    setTimeout(() => {
                        elements.changeStatus.innerText = '';
                    }, 2000);
                }
            }

            // Écouteurs
            elements.copyIpIcon.addEventListener('click', () => {
                const ip = elements.ipSpan.innerText;
                if (ip && ip !== '--.--.--.--') {
                    navigator.clipboard.writeText(ip);
                }
            });

            elements.changeBtn.addEventListener('click', fetchNewProxy);

            // Chargement initial
            fetchNewProxy();
        })();
    </script>
</body>
</html>
